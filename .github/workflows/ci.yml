name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: >-
          python -m compileall -q
          .kiro/skills/sagemaker-deploy/scripts
          .kiro/skills/sagemaker-benchmark/scripts
          .kiro/skills/sagemaker-optimize/scripts
          tests
      - run: python -m unittest discover -s tests -v
